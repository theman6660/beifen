name: Daily Report Pipeline

on:
  schedule:
    - cron: '17 0 * * *'  # 北京时间 8:17，避开整点高峰
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-deploy
  cancel-in-progress: false

jobs:
  ai-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Compute Beijing date
        id: bj-date
        run: echo "date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"
      - name: Generate AI Daily
        env:
          AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BASE_URL: https://api.deepseek.com
          MODEL: deepseek-v4-pro
          BJ_DATE: ${{ steps.bj-date.outputs.date }}
        run: node ai-daily.js --no-deploy
      - uses: actions/upload-artifact@v7
        with:
          name: ai-posts
          path: source/_posts/ai-daily-${{ steps.bj-date.outputs.date }}.md
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: ai-chronicle
          path: source/_posts/ai-chronicle.md
          if-no-files-found: warn

  society-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }
      - run: npm ci
      - name: Compute Beijing date
        id: bj-date
        run: echo "date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"
      - name: Generate Society Daily
        env:
          AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          BASE_URL: https://api.deepseek.com
          MODEL: deepseek-v4-pro
          RSSHUB_URL: ${{ secrets.RSSHUB_URL }}
          BJ_DATE: ${{ steps.bj-date.outputs.date }}
        run: node society-daily.js --no-deploy
      - uses: actions/upload-artifact@v7
        with:
          name: society-posts
          path: source/_posts/society-daily-${{ steps.bj-date.outputs.date }}.md
          if-no-files-found: error

  deploy:
    needs: [ai-daily, society-daily]
    if: always() && !cancelled() && (needs.ai-daily.result == 'success' || needs.society-daily.result == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with: { node-version: '22', cache: 'npm' }

      - run: npm ci

      - name: Sync source branch
        run: |
          git stash --include-untracked 2>/dev/null || true
          git pull --rebase origin main
          git stash pop 2>/dev/null || true

      - uses: actions/download-artifact@v8
        with: { name: ai-posts, path: source/_posts/ }
      - uses: actions/download-artifact@v8
        with: { name: society-posts, path: source/_posts/ }
      - uses: actions/download-artifact@v8
        with: { name: ai-chronicle, path: source/_posts/ }
        continue-on-error: true

      - name: Compute Beijing date
        id: bj-deploy
        run: echo "date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"

      - name: Check today's files exist
        run: |
          AI="source/_posts/ai-daily-${{ steps.bj-deploy.outputs.date }}.md"
          SOC="source/_posts/society-daily-${{ steps.bj-deploy.outputs.date }}.md"
          FOUND=""
          [ -f "$AI" ] && FOUND="$FOUND ai-daily"
          [ -f "$SOC" ] && FOUND="$FOUND society-daily"
          if [ -z "$FOUND" ]; then
            echo "❌ 今天没有任何日报文件生成，中止部署"
            exit 1
          fi
          echo "📄 今天生成的文件: $FOUND"

      - name: Validate today's frontmatter
        run: |
          echo "=== 检查今日文章的 frontmatter ==="
          DATE="${{ steps.bj-deploy.outputs.date }}"
          errors=0
          for f in "source/_posts/ai-daily-$DATE.md" "source/_posts/society-daily-$DATE.md"; do
            [ -f "$f" ] || continue
            echo "检查: $f"
            fm=$(sed -n '/^---$/,/^---$/p' "$f")
            if [ -z "$fm" ]; then
              echo "  ❌ 缺少 frontmatter"
              errors=$((errors + 1))
              continue
            fi
            ok=true
            for field in title date; do
              if ! echo "$fm" | grep -q "^${field}:"; then
                echo "  ❌ 缺少必需字段: $field"
                errors=$((errors + 1))
                ok=false
              fi
            done
            bad=$(echo "$fm" | grep -P '^[a-zA-Z_-]+:[^ \n]' || true)
            if [ -n "$bad" ]; then
              echo "  ❌ YAML 字段格式错误（冒号后缺空格）: $bad"
              errors=$((errors + 1))
              ok=false
            fi
            if $ok; then
              echo "  ✅ 通过"
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "❌ 验证失败，$errors 个错误，中止部署"
            exit 1
          fi
          echo "✅ 今日文章验证通过"

      - name: Commit generated posts
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          DATE="${{ steps.bj-deploy.outputs.date }}"
          git add "source/_posts/ai-daily-$DATE.md" "source/_posts/society-daily-$DATE.md" source/_posts/ai-chronicle.md 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "生成文章无变更"
          else
            git config user.name "theman6660"
            git config user.email "theman6660@users.noreply.github.com"
            git commit -m "docs: 更新日报 $DATE"
            git push "https://x-access-token:${DEPLOY_TOKEN}@github.com/theman6660/beifen.git" main
            echo "✅ 生成文章已提交到源仓库"
          fi

      - name: Build and deploy
        id: deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config --global user.name "theman6660"
          git config --global user.email "theman6660@users.noreply.github.com"

          npx hexo clean
          npx hexo generate

          if [ ! -f public/index.html ]; then
            echo "❌ 构建失败：public/index.html 不存在"
            exit 1
          fi
          if [ ! -s public/index.html ]; then
            echo "❌ 构建失败：public/index.html 为空"
            exit 1
          fi

          cd public
          git init
          git checkout -b main
          git add -A

          if git diff --staged --quiet; then
            echo "无变更，跳过部署"
            echo "deployed=false" >> "$GITHUB_OUTPUT"
          else
            now=$(date +%Y-%m-%d)
            git commit -m "deploy $now"
            git push -f "https://x-access-token:${DEPLOY_TOKEN}@github.com/theman6660/theman6660.github.io.git" main
            echo "deployed=true" >> "$GITHUB_OUTPUT"
            echo "✅ 部署完成"
          fi

      - name: Tag deploy
        if: steps.deploy.outputs.deployed == 'true'
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          now=$(date +%Y-%m-%d-%H%M%S)
          git tag "deploy-$now"
          git push "https://x-access-token:${DEPLOY_TOKEN}@github.com/theman6660/beifen.git" "deploy-$now"
