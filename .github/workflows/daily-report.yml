name: Daily Report Pipeline

on:
  schedule:
    # 北京时间每天早上 8:00 (UTC+8 = 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install hexo dependencies
        run: npm ci

      - name: Install report script dependencies
        run: |
          cd scripts
          npm install openai@^4.0.0 rss-parser@^3.13.0 dotenv@^16.4.0 https-proxy-agent@^9.0.0

      - name: Run AI Daily Report
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
        run: node scripts/ai-daily.js --no-deploy

      - name: Run Society Daily Report
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          RSSHUB_URL: ${{ secrets.RSSHUB_URL }}
        run: node scripts/society-daily.js --no-deploy

      - name: Build & Deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config --global user.name "theman6660"
          git config --global user.email "theman6660@users.noreply.github.com"
          node -e "
            const fs=require('fs'),yml=fs.readFileSync('_config.yml','utf8');
            const token=process.env.DEPLOY_TOKEN;
            const updated=yml.replace(/repo:\s*https:\/\/github\.com/g,'repo: https://x-access-token:'+token+'@github.com');
            fs.writeFileSync('_config.yml',updated);
          "
          npx hexo deploy
