name: Daily Report Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # 北京时间 8:00
  workflow_dispatch:

jobs:
  ai-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: cd scripts && npm install openai@^4.0.0 rss-parser@^3.13.0 dotenv@^16.4.0 https-proxy-agent@^9.0.0
      - name: Generate AI Daily
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
        run: node scripts/ai-daily.js --no-deploy
      - uses: actions/upload-artifact@v4
        with:
          name: ai-posts
          path: source/_posts/ai-daily-*.md

  society-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: cd scripts && npm install openai@^4.0.0 rss-parser@^3.13.0 dotenv@^16.4.0 https-proxy-agent@^9.0.0
      - name: Generate Society Daily
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          RSSHUB_URL: ${{ secrets.RSSHUB_URL }}
        run: node scripts/society-daily.js --no-deploy
      - uses: actions/upload-artifact@v4
        with:
          name: society-posts
          path: source/_posts/society-daily-*.md

  deploy:
    needs: [ai-daily, society-daily]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - uses: actions/download-artifact@v4
        with: { name: ai-posts, path: source/_posts/ }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: society-posts, path: source/_posts/ }
        continue-on-error: true
      - name: Deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config --global user.name "theman6660"
          git config --global user.email "theman6660@users.noreply.github.com"
          node -e "
            const fs=require('fs'),yml=fs.readFileSync('_config.yml','utf8');
            const token=process.env.DEPLOY_TOKEN;
            const updated=yml.replace(/repo:\s*https:\/\/github\.com/g,'repo: https://x-access-token:'+token+'@github.com');
            fs.writeFileSync('_config.yml',updated);
          "
          npx hexo deploy
