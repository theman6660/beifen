name: Daily Report Pipeline

on:
  schedule:
    # 北京时间每天早上 8:00 (UTC+8 = 00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 手动触发

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install hexo dependencies
        run: npm ci

      - name: Install report script dependencies
        run: |
          cd scripts
          npm install openai@^4.0.0 rss-parser@^3.13.0 dotenv@^16.4.0 https-proxy-agent@^9.0.0

      - name: Run AI Daily Report
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
        run: node scripts/ai-daily.js

      - name: Run Society Daily Report
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          RSSHUB_URL: ${{ secrets.RSSHUB_URL }}
        run: node scripts/society-daily.js

      - name: Deploy to GitHub Pages
        env:
          GIT_USER: ${{ secrets.GIT_USER || 'theman6660' }}
          GIT_EMAIL: ${{ secrets.GIT_EMAIL || 'theman6660@users.noreply.github.com' }}
        run: |
          git config --global user.name "$GIT_USER"
          git config --global user.email "$GIT_EMAIL"
          npx hexo deploy
