name: Daily Report Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # 北京时间 8:00
  workflow_dispatch:

jobs:
  ai-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - name: Generate AI Daily
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
        run: node ai-daily.js --no-deploy
      - uses: actions/upload-artifact@v4
        with:
          name: ai-posts
          path: source/_posts/ai-daily-*.md

  society-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - name: Generate Society Daily
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          RSSHUB_URL: ${{ secrets.RSSHUB_URL }}
        run: node society-daily.js --no-deploy
      - uses: actions/upload-artifact@v4
        with:
          name: society-posts
          path: source/_posts/society-daily-*.md

  deploy:
    needs: [ai-daily, society-daily]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 完整历史，用于打tag

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - run: npm install

      - uses: actions/download-artifact@v4
        with: { name: ai-posts, path: source/_posts/ }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: society-posts, path: source/_posts/ }
        continue-on-error: true

      - name: Validate frontmatter
        run: |
          echo "=== 检查新生成文章的 frontmatter ==="
          errors=0
          for f in source/_posts/ai-daily-*.md source/_posts/society-daily-*.md; do
            [ -f "$f" ] || continue
            echo "检查: $f"
            # 提取 frontmatter（两个 --- 之间的内容）
            fm=$(sed -n '/^---$/,/^---$/p' "$f")
            if [ -z "$fm" ]; then
              echo "  ❌ 缺少 frontmatter"
              errors=$((errors + 1))
              continue
            fi
            # 检查必需字段
            for field in title date; do
              if ! echo "$fm" | grep -q "^${field}:"; then
                echo "  ❌ 缺少必需字段: $field"
                errors=$((errors + 1))
              fi
            done
            # 检查 YAML 合法性：冒号后必须有空格（防止解析失败）
            if echo "$fm" | grep -qP '(?<!:):(?![\s/])'; then
              echo "  ❌ frontmatter 中有不合法的冒号（可能造成 YAML 解析失败）"
              errors=$((errors + 1))
            fi
            echo "  ✅ 通过"
          done
          if [ $errors -gt 0 ]; then
            echo "❌ 验证失败，$errors 个错误，中止部署"
            exit 1
          fi
          echo "✅ 所有文章验证通过"

      - name: Build and deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config --global user.name "theman6660"
          git config --global user.email "theman6660@users.noreply.github.com"

          # 构建
          npx hexo clean
          npx hexo generate

          # 验证构建产物
          if [ ! -f public/index.html ]; then
            echo "❌ 构建失败：public/index.html 不存在"
            exit 1
          fi

          # 直接推送到 GitHub Pages repo（不修改 _config.yml）
          # 比 hexo deploy 更可靠：token 直接注入 URL，不依赖字符串替换
          cd public
          git init
          git checkout -b main
          git add -A
          now=$(date +%Y-%m-%d)
          git commit -m "deploy $now" || { echo "无变更，跳过部署"; exit 0; }
          git push -f "https://x-access-token:${DEPLOY_TOKEN}@github.com/theman6660/theman6660.github.io.git" main

      - name: Tag deploy
        run: |
          now=$(date +%Y-%m-%d-%H%M)
          git tag "deploy-$now"
          git push origin "deploy-$now"
