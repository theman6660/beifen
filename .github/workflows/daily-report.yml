name: Daily Report Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # 北京时间 8:00
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-deploy
  cancel-in-progress: false

jobs:
  ai-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - name: Generate AI Daily
        env:
          AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          BASE_URL: https://api.deepseek.com
          MODEL: deepseek-v4-pro
        run: node ai-daily.js --no-deploy
      - uses: actions/upload-artifact@v4
        with:
          name: ai-posts
          path: source/_posts/ai-daily-*.md
          if-no-files-found: error

  society-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm install
      - name: Generate Society Daily
        env:
          AUTH_TOKEN: ${{ secrets.DEEPSEEK_API_KEY }}
          BASE_URL: https://api.deepseek.com
          MODEL: deepseek-v4-pro
          RSSHUB_URL: ${{ secrets.RSSHUB_URL }}
        run: node society-daily.js --no-deploy
      - uses: actions/upload-artifact@v4
        with:
          name: society-posts
          path: source/_posts/society-daily-*.md
          if-no-files-found: error

  deploy:
    needs: [ai-daily, society-daily]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }

      - run: npm install

      - uses: actions/download-artifact@v4
        with: { name: ai-posts, path: source/_posts/ }
        continue-on-error: true
      - uses: actions/download-artifact@v4
        with: { name: society-posts, path: source/_posts/ }
        continue-on-error: true

      - name: Validate frontmatter
        run: |
          echo "=== 检查新生成文章的 frontmatter ==="
          errors=0
          for f in source/_posts/ai-daily-*.md source/_posts/society-daily-*.md; do
            [ -f "$f" ] || continue
            echo "检查: $f"
            fm=$(sed -n '/^---$/,/^---$/p' "$f")
            if [ -z "$fm" ]; then
              echo "  ❌ 缺少 frontmatter"
              errors=$((errors + 1))
              continue
            fi
            ok=true
            for field in title date; do
              if ! echo "$fm" | grep -q "^${field}:"; then
                echo "  ❌ 缺少必需字段: $field"
                errors=$((errors + 1))
                ok=false
              fi
            done
            bad=$(echo "$fm" | grep -P '^[a-zA-Z_-]+:[^ \n]' || true)
            if [ -n "$bad" ]; then
              echo "  ❌ YAML 字段格式错误（冒号后缺空格）: $bad"
              errors=$((errors + 1))
              ok=false
            fi
            if $ok; then
              echo "  ✅ 通过"
            fi
          done
          if [ $errors -gt 0 ]; then
            echo "❌ 验证失败，$errors 个错误，中止部署"
            exit 1
          fi
          echo "✅ 所有文章验证通过"

      - name: Build and deploy
        id: deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config --global user.name "theman6660"
          git config --global user.email "theman6660@users.noreply.github.com"

          npx hexo clean
          npx hexo generate

          if [ ! -f public/index.html ]; then
            echo "❌ 构建失败：public/index.html 不存在"
            exit 1
          fi
          if [ ! -s public/index.html ]; then
            echo "❌ 构建失败：public/index.html 为空"
            exit 1
          fi

          cd public
          git init
          git checkout -b main
          git add -A

          if git diff --staged --quiet; then
            echo "无变更，跳过部署"
            echo "deployed=false" >> "$GITHUB_OUTPUT"
          else
            now=$(date +%Y-%m-%d)
            git commit -m "deploy $now"
            git push -f "https://x-access-token:${DEPLOY_TOKEN}@github.com/theman6660/theman6660.github.io.git" main
            echo "deployed=true" >> "$GITHUB_OUTPUT"
            echo "✅ 部署完成"
          fi

      - name: Tag deploy
        if: steps.deploy.outputs.deployed == 'true'
        run: |
          now=$(date +%Y-%m-%d-%H%M%S)
          git tag "deploy-$now"
          git push origin "deploy-$now"
