name: Diary Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '15 14 * * *'   # UTC 14:15 = 北京 22:15 (给snippets推送留几分钟)

permissions:
  contents: write

concurrency:
  group: diary-generate
  cancel-in-progress: false

jobs:
  generate-diary:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Diary
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node diary-generator.js
        timeout-minutes: 10

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          diary_generated=false
          shopt -s nullglob
          for f in source/_posts/diary-*.md; do
            git add "$f"
            diary_generated=true
          done
          shopt -u nullglob

          git add data/snippets/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "无变更，跳过提交"
            exit 0
          fi

          # 先拉取远程、再推送（拉取失败不阻塞提交流程）
          git pull --rebase || echo "⚠️ 拉取远程失败，将直接推送"

          if [ "$diary_generated" = true ]; then
            git commit -m "docs: 日记 $(date +%Y-%m-%d)"
          else
            git commit -m "chore: 更新 snippets $(date +%Y-%m-%d)"
          fi
          git push
