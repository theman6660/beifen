name: Diary Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '15 14 * * *'   # UTC 14:15 = 北京 22:15 (给snippets推送留几分钟)

permissions:
  contents: write

jobs:
  generate-diary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install script dependencies
        run: npm ci
        working-directory: hexo-scripts

      - name: Generate Diary
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node hexo-scripts/diary-generator.js
        timeout-minutes: 5

      - name: Commit and deploy
        run: |
          npm ci
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 只在有diary文件时才add
          if ls source/_posts/diary-*.md 1>/dev/null 2>&1; then
            git add source/_posts/diary-*.md
          fi
          git add data/snippets/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "docs: 日记 $(date +%Y-%m-%d)"
          git pull --rebase
          git push
          npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: theman6660/theman6660.github.io
          publish_branch: main
          publish_dir: ./public
          force_orphan: true
