name: Diary Generator

on:
  workflow_dispatch:
  schedule:
    - cron: '15 14 * * *'   # UTC 14:15 = 北京 22:15 (给snippets推送留几分钟)

permissions:
  contents: write

concurrency:
  group: site-content-push
  cancel-in-progress: false

jobs:
  generate-diary:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Pull latest changes
        run: |
          git stash --include-untracked 2>/dev/null || true
          git pull --rebase origin main
          git stash pop 2>/dev/null || true

      - name: Generate Diary
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: node diary-generator.js
        timeout-minutes: 10

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          diary_generated=false
          shopt -s nullglob
          for f in source/_posts/diary-*.md; do
            git add "$f"
            diary_generated=true
          done
          shopt -u nullglob

          git add data/snippets/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "无变更，跳过提交"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$diary_generated" = true ]; then
            git commit -m "docs: 日记 $(date +%Y-%m-%d)"
          else
            git commit -m "chore: 更新 snippets $(date +%Y-%m-%d)"
          fi
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

  deploy-site:
    needs: generate-diary
    if: needs.generate-diary.outputs.changed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build and deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          git config --global user.name "theman6660"
          git config --global user.email "theman6660@users.noreply.github.com"

          npx hexo clean
          npx hexo generate

          if [ ! -f public/index.html ]; then
            echo "构建失败：public/index.html 不存在"
            exit 1
          fi
          if [ ! -s public/index.html ]; then
            echo "构建失败：public/index.html 为空"
            exit 1
          fi

          PAGES_DIR="$(mktemp -d)"
          git clone --depth 1 "https://x-access-token:${DEPLOY_TOKEN}@github.com/theman6660/theman6660.github.io.git" "$PAGES_DIR"
          rsync -a --delete --exclude '.git' public/ "$PAGES_DIR"/

          cd "$PAGES_DIR"
          git add -A

          if git diff --staged --quiet; then
            echo "无变更，跳过部署"
          else
            now=$(date +%Y-%m-%d)
            git commit -m "deploy diary $now"
            git push origin main
            echo "✅ 日记部署完成"
          fi
