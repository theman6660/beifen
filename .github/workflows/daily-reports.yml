name: Daily Reports

on:
  schedule:
    - cron: '0 0 * * *'    # UTC 0:00 = 北京 8:00 (AI日报)
    - cron: '30 0 * * *'   # UTC 0:30 = 北京 8:30 (社会思想日报)
  workflow_dispatch:        # 手动触发（两个日报都运行）

permissions:
  contents: write

jobs:
  ai-daily:
    if: github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hexo dependencies
        run: npm ci

      - name: Install script dependencies
        run: npm ci
        working-directory: hexo-scripts

      - name: Generate AI Daily Report
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
        run: node hexo-scripts/ai-daily.js
        timeout-minutes: 5

      - name: Commit and deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/_posts/ai-daily-*.md source/_posts/ai-chronicle.md
          git diff --staged --quiet || git commit -m "docs: AI日报 $(date +%Y-%m-%d)"
          git push
          npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: theman6660/theman6660.github.io
          publish_branch: main
          publish_dir: ./public
          force_orphan: true

  society-daily:
    if: github.event.schedule == '30 0 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hexo dependencies
        run: npm ci

      - name: Install script dependencies
        run: npm ci
        working-directory: hexo-scripts

      - name: Generate Society Daily Report
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          RSSHUB_URL: ${{ secrets.RSSHUB_URL }}
        run: node hexo-scripts/society-daily.js
        timeout-minutes: 5

      - name: Commit and deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/_posts/society-daily-*.md
          git diff --staged --quiet || git commit -m "docs: 社会思想日报 $(date +%Y-%m-%d)"
          git push
          npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: theman6660/theman6660.github.io
          publish_branch: main
          publish_dir: ./public
          force_orphan: true

  all-reports:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Hexo dependencies
        run: npm ci

      - name: Install script dependencies
        run: npm ci
        working-directory: hexo-scripts

      - name: Generate AI Daily Report
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
        run: node hexo-scripts/ai-daily.js
        continue-on-error: true
        timeout-minutes: 5

      - name: Generate Society Daily Report
        env:
          AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          MODEL: ${{ secrets.MODEL }}
          RSSHUB_URL: ${{ secrets.RSSHUB_URL }}
        run: node hexo-scripts/society-daily.js
        continue-on-error: true
        timeout-minutes: 5

      - name: Commit and deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/_posts/
          git diff --staged --quiet || git commit -m "docs: 日报 $(date +%Y-%m-%d)"
          git push
          npx hexo generate

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          external_repository: theman6660/theman6660.github.io
          publish_branch: main
          publish_dir: ./public
          force_orphan: true
